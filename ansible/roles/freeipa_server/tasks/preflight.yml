---
# freeipa_server/tasks/preflight.yml — Fail fast, then fix /etc/hosts.
#
# ipa-server-install refuses to run when the machine's FQDN resolves to a
# loopback address, which is exactly what cloud-init's RHEL-family
# /etc/hosts template produces. ipa-01 therefore boots with
# manage_etc_hosts: false (infra/cloud-init.tf) and this role owns the
# /etc/hosts entry. The scrub below also heals a VM first booted before
# that infra change, where the loopback lines are already in place.
- name: Assert vault secrets are loaded and not placeholders
  ansible.builtin.assert:
    that:
      - vault_freeipa_admin_password is defined
      - vault_freeipa_dm_password is defined
      - vault_freeipa_admin_password is not search("CHANGE_ME")
      - vault_freeipa_dm_password is not search("CHANGE_ME")
    fail_msg: >-
      Vault variables missing or still placeholders. Create ansible/vault.yml
      from ansible/vault.example.yml and encrypt it (see ansible/README.md).

- name: Remove loopback lines carrying the FQDN from /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^(127\.0\.0\.1|::1)\s+{{ inventory_hostname | regex_escape }}'
    state: absent

- name: Map the FQDN to the static address in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '\s{{ inventory_hostname | regex_escape }}(\s|$)'
    line: "{{ ansible_host }} {{ inventory_hostname }} {{ inventory_hostname_short }}"
