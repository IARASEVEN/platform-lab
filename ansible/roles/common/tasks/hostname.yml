---
# common/tasks/hostname.yml — Set hostname from inventory.
# The inventory keys hosts by FQDN (ipa-01.platform.internal) and FreeIPA
# requires the static hostname to be that FQDN, so inventory_hostname is
# used verbatim — no short-name splitting.
- name: Set static hostname from inventory_hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"
