---
# postgresql/tasks/preflight.yml — Fail fast: no vault, no run.
- name: Assert vault secrets are loaded and not placeholders
  ansible.builtin.assert:
    that:
      - vault_postgresql_password is defined
      - vault_postgresql_password is not search("CHANGE_ME")
    fail_msg: >-
      Vault variables missing or still placeholders. Create ansible/vault.yml
      from ansible/vault.example.yml and encrypt it (see ansible/README.md).
