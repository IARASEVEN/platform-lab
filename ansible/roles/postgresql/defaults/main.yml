---
# Image is exact-pinned like every other version in this repo: upgrades
# are deliberate, not drift. 16.14 was the newest 16.x-alpine on Docker
# Hub at implementation time (2026-07); Keycloak 26.6 supports PG 16.
postgresql_image: docker.io/library/postgres:16.14-alpine

# Single-tenant *instance*: whichever app consumes this role's Postgres
# on a given host is also that instance's only database and its
# superuser — there is nothing else on the instance to protect from it.
# idp-01 uses these defaults as-is (keycloak/keycloak, M3.1); app-01
# overrides all four at the play level for WikiJS (M3.3) — see
# ansible/playbooks/apps.yml. Both are created by the image's initdb on
# first boot, which is also this setup's limitation: the variables are
# read only when the data directory is empty. verify.yml catches drift.
postgresql_user: keycloak
postgresql_db: keycloak
postgresql_password: "{{ vault_postgresql_password }}"

# Bind-mounted PGDATA. Owned by the service account on the host; the
# image entrypoint chowns it to the in-container postgres user inside
# the user namespace on first boot.
postgresql_data_dir: /var/lib/postgresql-keycloak

# Published on the VM's own loopback only, for psql/runbook use on the
# VM itself — same-host consumers (Keycloak on idp-01, WikiJS on app-01)
# reach PostgreSQL over the rootless network below instead. The lab
# network cannot reach it, and no firewalld rule exists on purpose —
# nothing to open.
postgresql_listen_address: 127.0.0.1
postgresql_port: 5432

# This host's shared rootless network (postgres arrives first on it;
# later units on the same host — Keycloak at M3.2, WikiJS at M3.3 — join
# it and find PostgreSQL under its container DNS name, `postgres`). Each
# host that runs this role has its own network under this name; they
# never collide because rootless podman networks are per-user and this
# role never runs twice on the same host.
postgresql_network: idp

# Rootless plumbing (ADR-0004). One service account per host stack:
# rootless podman networks cannot span users, and every container on a
# given host (Keycloak + PostgreSQL on idp-01; WikiJS + PostgreSQL on
# app-01) shares its host's one network under one account. The password
# reaches the container as a podman secret so the unit file itself stays
# secret-free.
postgresql_service_user: svc-idp
postgresql_secret_name: postgresql-password

# passt provides pasta, rootless podman's network backend — listed
# explicitly because it is only a weak RPM dependency of podman.
postgresql_packages:
  - podman
  - passt
