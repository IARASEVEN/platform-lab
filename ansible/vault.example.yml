---
# Ansible Vault template. Copy to ansible/vault.yml, replace every value,
# then encrypt it:
#
#   cp ansible/vault.example.yml ansible/vault.yml
#   ansible-vault encrypt ansible/vault.yml --vault-password-file .vault-pass
#
# The real vault.yml and the vault password file are gitignored
# (**/vault.yml, .vault-pass*). Only this placeholder file is committed.
vault_freeipa_dm_password: "CHANGE_ME_32_chars_min"
vault_freeipa_admin_password: "CHANGE_ME_32_chars_min"
# Final password shared by the alice/bob HBAC demo users (hbac_setup role).
vault_demo_user_password: "CHANGE_ME_32_chars_min"
# Superuser password of the single-tenant PostgreSQL instance on idp-01
# (postgresql role). keycloak is its only role and its only database.
vault_postgresql_password: "CHANGE_ME_32_chars_min"
# Bootstrap admin of Keycloak's master realm (keycloak role). Keycloak
# reads it only while its database is empty — rotate via the admin
# console afterwards, not by changing this value.
vault_keycloak_admin_password: "CHANGE_ME_32_chars_min"
# Superuser password of the single-tenant PostgreSQL instance on app-01
# (postgresql role, overridden per apps.yml). wikijs is its only role
# and its only database.
vault_wikijs_db_password: "CHANGE_ME_32_chars_min"
# WikiJS's own local admin account (wikijs role) — separate from
# Keycloak-federated users, who authenticate through the OIDC strategy
# instead. Read only while WikiJS's first-run setup wizard is completed.
vault_wikijs_admin_password: "CHANGE_ME_32_chars_min"
# Shared secret between the Keycloak `wikijs` client (keycloak role,
# oidc_clients.yml) and WikiJS's own OIDC strategy config. Rotating it
# means updating both sides.
vault_wikijs_oidc_client_secret: "CHANGE_ME_32_chars_min"
vault_wikijs_db_password: "CHANGE_ME_32_chars_min"
vault_wikijs_admin_password: "CHANGE_ME_32_chars_min"
vault_wikijs_oidc_client_secret: "CHANGE_ME_32_chars_min"
