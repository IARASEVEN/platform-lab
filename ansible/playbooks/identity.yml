---
# Orchestrates the identity profile. Invoked through `make identity` after
# `make inventory` regenerates hosts.yml from Terraform state — never run
# against a hand-written inventory. Static role imports on purpose: dynamic
# includes would swallow the role tags, while here `--tags verify` re-runs
# just the FreeIPA health checks (kinit + GSSAPI ldapsearch included — the
# server role verifies itself, the playbook adds no weaker duplicate).
- name: Configure the identity baseline (M1.2)
  hosts: identity
  become: true
  gather_facts: true
  roles:
    - common

- name: Install and verify the FreeIPA server (M1.3)
  hosts: ipa
  become: true
  gather_facts: true
  vars_files:
    - ../vault.yml
  roles:
    - freeipa_server

- name: Enrol the IPA client (M1.5)
  hosts: client
  become: true
  gather_facts: true
  vars_files:
    - ../vault.yml
  roles:
    - freeipa_client

# Must run after the client play: the allow rule references client-01's
# host entry, which only exists once enrollment has run.
- name: Enforce HBAC deny-by-default (M1.5)
  hosts: ipa
  become: true
  gather_facts: true
  vars_files:
    - ../vault.yml
  roles:
    - hbac_setup

# idp-01 hosts the M3 SSO stack as rootless Quadlets (ADR-0004).
# PostgreSQL arrives first: M3.2's Keycloak lands beside it and expects
# the database to be answering.
- name: Deploy PostgreSQL for Keycloak (M3.1)
  hosts: idp
  become: true
  gather_facts: true
  vars_files:
    - ../vault.yml
  roles:
    - postgresql

# Keycloak consumes what the play above created — the service account,
# the idp network, the database — and what the ipa plays created: the
# 389-ds tree it federates to (ADR-0006). The role also registers M3.3+
# application OIDC clients (oidc_clients.yml) — wikijs today.
- name: Deploy Keycloak federated to FreeIPA (M3.2 + M3.3 clients)
  hosts: idp
  become: true
  gather_facts: true
  vars_files:
    - ../vault.yml
  roles:
    - keycloak

# Fronts Keycloak with the nginx role (ADR-0007): only the platform
# realm's OIDC endpoints become reachable from the lab network; the admin
# console and master realm stay SSH-tunnel-only, unchanged from M3.2.
# This is a separate play, not folded into the one above, because it
# needs no vault secrets and shouldn't re-run Keycloak's own tasks to
# pick up a config change here.
- name: Front Keycloak with the reverse proxy (M3.3)
  hosts: idp
  become: true
  gather_facts: true
  vars:
    nginx_site_name: keycloak
    nginx_site_template: "{{ playbook_dir }}/../roles/keycloak/templates/nginx-idp.conf.j2"
  roles:
    - nginx
