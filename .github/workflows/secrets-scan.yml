---
# Secrets scanning: gitleaks on every push and every PR, live from the first
# commit. Runs through the Makefile so CI and humans exercise the same
# interface. The binary is pinned and checksum-verified.
name: secrets-scan

# Quoted so yamllint does not read the key as a boolean.
"on":
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1
      GITLEAKS_SHA256: >-
        551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
    steps:
      - uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          curl -fsSLo gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum --check
          mkdir -p "${HOME}/.local/bin"
          tar -xzf gitleaks.tar.gz -C "${HOME}/.local/bin" gitleaks
          rm gitleaks.tar.gz
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Scan for secrets
        run: make secrets-scan
