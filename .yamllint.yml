---
# yamllint configuration. Extends the upstream defaults; the rule overrides
# below are the ones ansible-lint's `yaml` rule expects, so both linters
# agree on what well-formed YAML looks like.
extends: default

ignore: |
  .git/
  .terraform/
  # Generated inventory — gitignored, never linted (see ansible/inventory/).
  ansible/inventory/hosts.yml
  # Encrypted vault — gitignored; starts with $ANSIBLE_VAULT, not YAML.
  ansible/vault.yml

rules:
  line-length:
    max: 120
  # ansible-lint compatibility.
  comments:
    min-spaces-from-content: 1
  comments-indentation: false
  braces:
    max-spaces-inside: 1
  octal-values:
    forbid-implicit-octal: true
    forbid-explicit-octal: true
